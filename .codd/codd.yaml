# CoDD project configuration
version: "0.1.0"
codd_required_version: ">=2.19.0"
codd_required_version_strict: false

project:
  name: "SIFTQ"
  language: "generic"
  frameworks: []

ai_command: "codex exec"
coding_principles: null

scan:
  source_dirs:
    - "src/"
  test_dirs:
    - "tests/"
  doc_dirs:
    - "docs/"
  config_files:
    - "aqua.yaml"
    - "Taskfile.yml"
  exclude:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/dist/**"
    - "**/.venv/**"

graph:
  store: "jsonl"
  path: ".codd/scan"

dag:
  common_node_patterns:
    - "tests/docs/*.test.ts"
    - "tests/takt/*.test.ts"

bands:
  green:
    min_confidence: 0.90
    min_evidence_count: 2
  amber:
    min_confidence: 0.50

propagation:
  max_depth: 10
  stop_at_contract_boundary: true

verify:
  typecheck_command: null
  test_command: null
  report_output: "docs/test/verify_report.md"

typecheck:
  enabled: false
  command: null
  max_repair_attempts: 3

ci:
  provider: github_actions
  workflow_glob: ".github/workflows/*.yml"
  required_triggers:
    - push
    - pull_request
  runtime_check: false
  staleness_days: 14
  default_branch: main
