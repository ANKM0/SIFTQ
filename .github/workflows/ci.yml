name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install aqua
        uses: aquaproj/aqua-installer@v3.1.2
        with:
          aqua_version: v2.59.0

      - name: Install repository tools
        run: aqua install

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check commit messages
        run: uv run python scripts/ci/check_commit_messages.py "${{ github.event.pull_request.base.sha || github.event.before }}" "${{ github.sha }}"

      - name: Check Markdown
        run: uv run python scripts/ci/check_markdown.py

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check CoDD version
        run: uv run codd version --check

      - name: Scan CoDD graph
        run: uv run codd scan

      - name: Validate CoDD documents
        run: uv run codd validate

      - name: Verify CoDD DAG
        run: uv run codd dag verify
