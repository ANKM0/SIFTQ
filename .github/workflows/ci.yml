name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install aqua
        uses: aquaproj/aqua-installer@v3.1.2
        with:
          aqua_version: v2.59.0

      - name: Install repository tools
        run: aqua install

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Python dependencies
        run: task setup:python

      - name: Install frontend dependencies
        run: task setup:frontend:ci

      - name: Check commit messages
        run: task ci:commit-messages -- "${{ github.event.pull_request.base.sha || github.event.before }}" "${{ github.sha }}"

      - name: Check Markdown
        run: task ci:markdown

      - name: Typecheck
        run: task ci:typecheck

      - name: Lint
        run: task ci:lint

      - name: Test
        run: task ci:test

      - name: Build
        run: task ci:build

      - name: Check CoDD version
        run: task codd:version

      - name: Scan CoDD graph
        run: task codd:scan

      - name: Validate CoDD documents
        run: task codd:validate

      - name: Verify CoDD DAG
        run: task codd:dag
