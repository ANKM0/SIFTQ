name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      notes:
        description: "Release notes"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$'; then
              echo "tag must start with v and look like a version" >&2
              exit 1
            fi
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ inputs.notes }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          if [ -n "$RELEASE_NOTES" ]; then
            gh release create "$tag" --title "$tag" --notes "$RELEASE_NOTES"
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
