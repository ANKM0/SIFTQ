name: CoDD

on:
  push:
  pull_request:

jobs:
  codd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aqua
        uses: aquaproj/aqua-installer@v3.1.2
        with:
          aqua_version: v2.59.0

      - name: Install tools
        run: aqua install

      - name: Install Python dependencies
        run: uv sync

      - name: Check CoDD version
        run: uv run codd version --check

      - name: Scan CoDD graph
        run: uv run codd scan

      - name: Validate CoDD documents
        run: uv run codd validate

